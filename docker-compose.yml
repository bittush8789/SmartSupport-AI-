version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    networks:
      - smartsupport-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartsupport
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartsupport-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - smartsupport-net

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/data
    networks:
      - smartsupport-net

networks:
  smartsupport-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
